<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="./popup.css">
  <title>Slaze</title>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Slaze</h1>
        <p class="tagline">Community-powered post quality ratings</p>
      </div>
    </div>
  </header>

  <div id="status" class="status"></div>
  <div class="info-panel">
    <p class="info-title">You're all set.</p>
    <p class="info-copy">
      Visit our website for more information.
      <a href="https://slaze.it.com" target="_blank" rel="noopener noreferrer">https://slaze.it.com</a>
    </p>
    <p class="info-copy">
      On Reddit, use the <strong>Slaze.it</strong> button next to <strong>Share</strong> on post cards to rate content.
    </p>
    <p class="info-copy">
      On X/Twitter, find the <strong>Slaze.it</strong> button in the action bar below each tweet.
    </p>
  </div>

  <script type="module" src="./index.ts"></script>
